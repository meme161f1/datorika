<!DOCTYPE html>
<html>
<head><title>Forma</title></head>
<body>
    <form id="calc">
        <input type="number" id="n1">
        <input type="number" id="n2">
        <br><br>
        <button type="button" onclick="res.value=Number(n1.value)+Number(n2.value)">Saskaitīt</button>
        <button type="button" onclick="res.value=Number(n1.value)-Number(n2.value)">Atņemt</button>
        <button type="button" onclick="res.value=Number(n1.value)/Number(n2.value)">Dalīt</button>
        <button type="reset">Reset</button>
        <br>
        Rezultāts: <output id="res"></output>
    </form>
    <br><a href="index.html">Atpakaļ</a>
</body>
</html>
