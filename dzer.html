<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Dzēriena cena</title>
    <link rel="stylesheet" href="CSS/mansStils.css">
    <style>
        .container { padding: 20px; text-align: center; }
        .price-tag { font-weight: bold; margin-left: 10px; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dzērienu pasūtīšana</h1>
        <p>Izvēlies dzērienu, lai redzētu tā cenu:</p>
        
        <div class="item">
            <button onclick="document.getElementById('p1').innerText='1.50 €'">Ūdens</button>
            <span id="p1" class="price-tag"></span> </div>
        <br>
        <div class="item">
            <button onclick="document.getElementById('p2').innerText='2.20 €'">Sula</button>
            <span id="p2" class="price-tag"></span>
        </div>

        <br><br>
        <a href="index.html">Atpakaļ uz sākumu</a>
    </div>
</body>
</html>
